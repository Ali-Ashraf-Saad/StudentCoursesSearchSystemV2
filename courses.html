<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مقررات الفرق | StudentsCourses</title>
  <link rel="icon" href="/favicon.ico?v=2">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap");

    * { box-sizing: border-box; }
    body {
      font-family: "Cairo", sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: #fff;
      margin: 0; padding: 0;
      min-height: 100vh;
      display: flex; flex-direction: column;
      padding-top: 70px;
    }
    body.no-scroll { overflow: hidden; }

    .top-nav {
      position: fixed; top: 0; left: 0; width: 100%;
      background: rgba(15, 23, 42, 0.92); backdrop-filter: blur(12px);
      display: flex; justify-content: center; align-items: center; gap: 20px;
      padding: 10px 20px; z-index: 1000;
      box-shadow: 0 2px 15px rgba(0,0,0,0.5);
      border-bottom: 1px solid rgba(59,130,246,0.3);
    }
    .nav-btn {
      display: flex; align-items: center; gap: 8px;
      background: transparent; border: none; color: #e2e8f0;
      font-family: "Cairo", sans-serif; font-size: 16px; font-weight: 600;
      cursor: pointer; padding: 8px 16px; border-radius: 10px;
      transition: background 0.3s, color 0.3s, transform 0.2s;
    }
    .nav-btn svg { width: 24px; height: 24px; fill: currentColor; transition: transform 0.25s; }
    .nav-btn:hover { background: rgba(59,130,246,0.2); color: #60a5fa; transform: translateY(-2px); }
    .nav-btn:hover svg { transform: scale(1.1); }
    .nav-btn:active { transform: scale(0.96); }

    .container { max-width: 800px; margin: auto; padding: 20px 20px 40px; flex: 1; width: 100%; }
    h1 { text-align: center; margin: 10px 0 20px; font-weight: 600; }
    
    .visitor-badge {
      text-align: center; margin: 0 auto 20px auto; color: #94a3b8; font-size: 14px;
      background: rgba(30,41,59,0.5); padding: 4px 16px; border-radius: 20px;
      backdrop-filter: blur(4px); width: fit-content; display: block;
    }      
    .overall-progress {
      background: rgba(30,41,59,0.7); backdrop-filter: blur(10px);
      border-radius: 16px; padding: 12px 20px; margin-bottom: 20px;
      display: flex; align-items: center; gap: 15px; flex-wrap: wrap;
    }
    .progress-bar-wrap { flex: 1; min-width: 150px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); border-radius: 10px; transition: width 0.4s; }
    .progress-text { white-space: nowrap; color: #cbd5e1; font-size: 14px; }

    .filters {
      display: flex; flex-wrap: wrap; gap: 15px; background: rgba(30,41,59,0.6);
      border-radius: 20px; padding: 20px; margin-bottom: 25px;
      justify-content: center; backdrop-filter: blur(10px); align-items: flex-end;
    }
    .filter-group { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .filter-group label { font-size: 14px; color: #94a3b8; }
    select {
      background: #1e293b; color: white; border: none; border-radius: 12px;
      font-family: "Cairo", sans-serif; font-size: 15px; outline: none;
      cursor: pointer; min-width: 140px; transition: box-shadow 0.3s; height: 44px; text-align-last: center;
    }
    select:focus { box-shadow: 0 0 12px #3b82f6; }
    select:disabled { opacity: 0.5; cursor: not-allowed; }

    .year-nav { display: flex; gap: 5px; align-items: flex-end; }
    .nav-arrow-btn {
      background: rgba(59,130,246,0.2); border: 1px solid rgba(59,130,246,0.4);
      color: #60a5fa; font-family: "Cairo", sans-serif; font-size: 16px; font-weight: 600;
      padding: 8px 14px; border-radius: 12px; cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s; height: 44px; display: flex; align-items: center; justify-content: center; min-width: 44px;
    }
    .nav-arrow-btn:hover:not(:disabled) { background: rgba(59,130,246,0.4); box-shadow: 0 0 12px rgba(59,130,246,0.3); }
    .nav-arrow-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .action-btn {
      background: rgba(245,158,11,0.2); border: 1px solid rgba(245,158,11,0.5);
      color: #fbbf24; font-family: "Cairo", sans-serif; font-size: 13px; font-weight: 600;
      padding: 8px 16px; border-radius: 12px; cursor: pointer; transition: background 0.2s; height: 44px; white-space: nowrap;
      display: flex; align-items: center; gap: 5px;
    }
    .action-btn:hover { background: rgba(245,158,11,0.4); }

    .clear-data-btn {
      background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5);
      color: #fca5a5; font-family: "Cairo", sans-serif; font-size: 13px; font-weight: 600;
      padding: 8px 16px; border-radius: 12px; cursor: pointer; transition: background 0.2s; height: 44px; white-space: nowrap;
    }
    .clear-data-btn:hover { background: rgba(239,68,68,0.4); }

    .semester-block { margin-bottom: 30px; animation: fadeSlide 0.4s ease; }
    .semester-title {
      font-size: 20px; font-weight: 700; margin-bottom: 15px; padding-bottom: 8px;
      border-bottom: 2px solid rgba(59,130,246,0.4); color: #e2e8f0; display: flex; align-items: center; justify-content: space-between;
    }
    .select-all-btn {
      background: rgba(59,130,246,0.2); border: 1px solid rgba(59,130,246,0.5);
      color: #60a5fa; font-family: "Cairo", sans-serif; font-size: 13px; font-weight: 600;
      padding: 4px 12px; border-radius: 20px; cursor: pointer; transition: background 0.2s; white-space: nowrap;
    }
    .select-all-btn:hover { background: rgba(59,130,246,0.4); }

    .courses-grid { display: flex; flex-direction: column; gap: 12px; }
    .course-card {
      background: rgba(30, 41, 59, 0.85);
      border-radius: 16px; padding: 16px 18px;
      display: flex; align-items: center; gap: 16px;
      border-right: 5px solid #3b82f6;
      transition: box-shadow 0.3s, background 0.3s;
      cursor: pointer; position: relative;
      overflow: hidden;
    }
    .course-card:hover { box-shadow: 0 8px 25px rgba(59,130,246,0.3); }
    .course-card.completed { border-right-color: #10b981; background: rgba(30,41,59,0.5); }
    .completed-badge {
      position: absolute; top: 8px; right: 16px; font-size: 13px; color: #10b981;
      font-weight: 600; opacity: 0; transition: opacity 0.2s; pointer-events: none;
    }
    .course-card.completed .completed-badge { opacity: 1; }
    .checkbox-custom {
      width: 28px; height: 28px; border-radius: 50%; border: 2px solid #94a3b8;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: 0.2s; color: transparent; font-size: 18px; background: transparent;
    }
    .course-card.completed .checkbox-custom { border-color: #10b981; background: #10b981; color: white; }
    .course-info { flex: 1; }
    .course-arabic { font-weight: 600; font-size: 17px; color: #f1f5f9; }
    .course-code { font-size: 14px; color: #94a3b8; margin: 2px 0; }
    .course-english { font-size: 13px; color: #64748b; }
    
    /* تنسيق متطلبات */
    .prereq {
      font-size: 12px; color: #fcd34d; margin-top: 5px; direction: rtl; text-align: right;
      font-weight: 600;
    }
    .prereq-label {
      background: rgba(245, 158, 11, 0.2);
      padding: 1px 8px;
      border-radius: 8px;
      margin-left: 5px;
    }
    .prereq-item {
      display: inline-block;
      background: rgba(245,158,11,0.15);
      padding: 2px 8px;
      border-radius: 12px;
      margin-inline-end: 4px;
      font-weight: normal;
    }

    .open-courses-btn {
      background: rgba(99,102,241,0.25); border: 1px solid rgba(129,140,248,0.5);
      color: #a5b4fc; font-family: "Cairo", sans-serif; font-size: 13px; font-weight: 600;
      padding: 6px 14px; border-radius: 20px; cursor: pointer; transition: background 0.2s, box-shadow 0.2s;
      white-space: nowrap; display: flex; align-items: center; gap: 5px; flex-shrink: 0;
    }
    .open-courses-btn:hover { background: rgba(99,102,241,0.45); box-shadow: 0 0 15px rgba(99,102,241,0.3); }

    .empty-msg { text-align: center; color: #94a3b8; padding: 40px; }

    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 2000;
      display: flex; align-items: center; justify-content: center; animation: fadeIn 0.25s;
    }
    .modal-content {
      background: #1e293b; border-radius: 20px; padding: 25px 20px; max-width: 600px;
      width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      border: 1px solid rgba(59,130,246,0.3); position: relative; animation: slideUp 0.3s;
    }
    .modal-close {
      position: absolute; top: 12px; left: 16px; background: rgba(239,68,68,0.2);
      border: none; color: #fca5a5; font-size: 20px; font-weight: 700; cursor: pointer;
      border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: rgba(239,68,68,0.5); }
    .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: #e2e8f0; text-align: center; }
    .modal-dept-group { margin-bottom: 18px; }
    .modal-dept-title { font-size: 16px; font-weight: 700; color: #60a5fa; margin-bottom: 8px; border-bottom: 1px dashed rgba(96,165,250,0.3); padding-bottom: 4px; }
    .modal-course-item { background: rgba(15,23,42,0.7); padding: 8px 12px; border-radius: 10px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    .modal-course-item .course-name { color: #f1f5f9; font-weight: 600; }
    .modal-course-item .course-detail { color: #94a3b8; font-size: 12px; }
    .modal-total { text-align: center; margin-top: 15px; font-weight: 700; color: #fbbf24; }

    .confirm-modal .modal-content { max-width: 420px; text-align: center; }
    .confirm-modal .modal-title { margin-bottom: 10px; }
    .confirm-modal .modal-message { color: #cbd5e1; margin-bottom: 25px; font-size: 16px; }
    .confirm-buttons { display: flex; justify-content: center; gap: 15px; }
    .confirm-btn {
      background: rgba(59,130,246,0.2); border: 1px solid rgba(59,130,246,0.5);
      color: #60a5fa; font-family: "Cairo", sans-serif; font-size: 15px; font-weight: 600;
      padding: 10px 24px; border-radius: 12px; cursor: pointer; transition: background 0.2s;
    }
    .confirm-btn.danger { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.5); color: #fca5a5; }
    .confirm-btn:hover { background: rgba(59,130,246,0.4); }
    .confirm-btn.danger:hover { background: rgba(239,68,68,0.5); }

    .reminder-section { margin-top: 40px; background: rgba(30,41,59,0.4); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; }
    .reminder-title { font-size: 18px; font-weight: 600; margin-bottom: 15px; color: #f1f5f9; }
    .year-reminder { background: rgba(15,23,42,0.7); border-radius: 14px; margin-bottom: 10px; overflow: hidden; }
    .year-header { padding: 12px 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; color: #e2e8f0; }
    .year-header:hover { background: rgba(59,130,246,0.15); }
    .year-header .arrow { transition: transform 0.3s; font-size: 14px; }
    .year-reminder.open .arrow { transform: rotate(180deg); }
    .year-body-wrapper { overflow: hidden; transition: height 0.4s ease; height: 0; }
    .year-body { padding: 15px 18px; background: rgba(0,0,0,0.2); }
    .term-separator { color: #f59e0b; font-size: 14px; font-weight: 600; margin: 0 0 8px; padding-top: 15px; border-bottom: 1px dashed rgba(245,158,11,0.3); }
    .term-separator:first-of-type { margin-top: 0; padding-top: 0; }
    .remaining-list { list-style: none; padding: 0; margin: 0; }
    .remaining-list li { padding: 8px 12px; border-bottom: 1px solid rgba(148,163,184,0.1); color: #cbd5e1; font-size: 14px; display: flex; justify-content: space-between; }
    .remaining-code { color: #64748b; font-size: 12px; }

    footer { text-align: center; padding: 15px; background: rgba(15,23,42,0.9); color: #94a3b8; font-size: 14px; border-top: 1px solid rgba(148,163,184,0.2); }
    footer a { color: #60a5fa; text-decoration: none; }
    footer a:hover { color: #93c5fd; }

    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: #f87171; border: 1px solid #f87171; padding: 12px 24px;
      border-radius: 30px; font-size: 14px; font-weight: 600; backdrop-filter: blur(15px);
      z-index: 1000; opacity: 0; transition: opacity 0.4s; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    @keyframes fadeSlide { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <nav class="top-nav">
    <button class="nav-btn" onclick="window.location.href='/'">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      <span>العودة</span>
    </button>
    <button class="nav-btn" onclick="location.reload()">
      <svg viewBox="0 0 24 24"><path d="M12 6v3l4-4-4-4v3c-4.42 0-8 3.58-8 8 0 1.57.46 3.03 1.24 4.26L6.7 14.8c-.45-.83-.7-1.79-.7-2.8 0-3.31 2.69-6 6-6zm6.76 1.74L17.3 9.2c.45.83.7 1.79.7 2.8 0 3.31-2.69 6-6 6v-3l-4 4 4 4v-3c4.42 0 8-3.58 8-8 0-1.57-.46-3.03-1.24-4.26z"/></svg>
      <span>تحديث</span>
    </button>
  </nav>

  <div class="toast" id="toast"></div>

  <div class="modal-overlay" id="openCoursesModal" style="display:none;">
    <div class="modal-content">
      <button class="modal-close" id="closeModalBtn">&times;</button>
      <div class="modal-title" id="modalTitle"></div>
      <div id="modalBody"></div>
    </div>
  </div>

  <div class="modal-overlay confirm-modal" id="confirmModal" style="display:none;">
    <div class="modal-content">
      <button class="modal-close" id="closeConfirmModalBtn">&times;</button>
      <div class="modal-title">تأكيد مسح البيانات</div>
      <div class="modal-message">هل أنت متأكد من مسح جميع البيانات المحفوظة؟ (حالة المواد والفلتر)</div>
      <div class="confirm-buttons">
        <button class="confirm-btn danger" id="confirmClearBtn">نعم، امسح</button>
        <button class="confirm-btn" id="cancelClearBtn">إلغاء</button>
      </div>
    </div>
  </div>

  <div class="container">
    <h1>مقررات الفرق</h1>
    <div class="visitor-badge" id="visitorCounter">
      عدد الزوار: <span id="visitCount">...</span>
    </div>

    <div class="overall-progress">
      <div class="progress-bar-wrap"><div class="progress-fill" id="overallProgressFill" style="width:0%"></div></div>
      <div class="progress-text" id="overallProgressText">0 / 0</div>
    </div>

    <div class="filters">
      <div class="filter-group">
        <label for="yearSelect">الفرقة</label>
        <div class="year-nav">
          <button class="nav-arrow-btn" id="nextYearBtn">▶</button>
          <select id="yearSelect"><option value="1">الأولى</option><option value="2">الثانية</option><option value="3">الثالثة</option><option value="4">الرابعة</option></select>
          <button class="nav-arrow-btn" id="prevYearBtn">◀</button>
        </div>
      </div>
      <div class="filter-group">
        <label for="deptSelect">القسم</label>
        <select id="deptSelect"><option value="" disabled>اختر القسم</option><option value="عام">عام</option><option value="CS">CS</option><option value="IT">IT</option><option value="IS">IS</option></select>
      </div>
      <div class="filter-group">
        <label for="termSelect">الترم</label>
        <select id="termSelect"><option value="all">الكل</option><option value="1">ترم أول</option><option value="2">ترم ثاني</option></select>
      </div>
      <button class="action-btn" id="fillPreviousBtn" title="تحديد جميع مواد السنوات السابقة">تحديد جميع المواد السابقة</button>
      <button class="clear-data-btn" id="clearDataBtn">مسح البيانات</button>
    </div>

    <div id="coursesContainer"></div>

    <div class="reminder-section" id="reminderSection">
      <div class="reminder-title">تذكير المواد غير المكتملة</div>
      <div id="reminderContainer"></div>
    </div>
  </div>

  <footer>StudentsCourses 2026 &middot; Developed by Ali Ashraf &middot; <a href="http://wa.me/+201148727448" target="_blank">Contact Me</a></footer>

  <script>
    const STORAGE_FILTER = 'courses_filter';
    const STORAGE_COMPLETED = 'completed_courses';

    const yearSelect = document.getElementById('yearSelect');
    const deptSelect = document.getElementById('deptSelect');
    const termSelect = document.getElementById('termSelect');
    const container = document.getElementById('coursesContainer');
    const overallProgressFill = document.getElementById('overallProgressFill');
    const overallProgressText = document.getElementById('overallProgressText');
    const reminderContainer = document.getElementById('reminderContainer');
    const toast = document.getElementById('toast');
    const clearDataBtn = document.getElementById('clearDataBtn');
    const prevYearBtn = document.getElementById('prevYearBtn');
    const nextYearBtn = document.getElementById('nextYearBtn');
    const fillPreviousBtn = document.getElementById('fillPreviousBtn');

    const openCoursesModal = document.getElementById('openCoursesModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const confirmModal = document.getElementById('confirmModal');
    const closeConfirmModalBtn = document.getElementById('closeConfirmModalBtn');
    const confirmClearBtn = document.getElementById('confirmClearBtn');
    const cancelClearBtn = document.getElementById('cancelClearBtn');

    let allData = [];
    let courseMap = {};
    let prereqToDependents = {};
    let courseDetailsMap = {};
    let completedSet = new Set(JSON.parse(localStorage.getItem(STORAGE_COMPLETED) || '[]'));
    let realDept = '';

    function loadCoursesCounter() {
      fetch("course_counter.php?action=get")
        .then(r => r.json())
        .then(d => {
          const el = document.getElementById("visitCount");
          if (el) el.innerText = d.count ?? 0;
        })
        .catch(() => {
          const el = document.getElementById("visitCount");
          if (el) el.innerText = "--";
        });
    }
    loadCoursesCounter();
    setInterval(loadCoursesCounter, 5000);

    function lockScroll() { document.body.classList.add('no-scroll'); }
    function unlockScroll() { document.body.classList.remove('no-scroll'); }

    function openConfirmModal() {
      confirmModal.style.display = 'flex';
      lockScroll();
    }
    function closeConfirmModal() {
      confirmModal.style.display = 'none';
      unlockScroll();
    }
    closeConfirmModalBtn.addEventListener('click', closeConfirmModal);
    cancelClearBtn.addEventListener('click', closeConfirmModal);
    confirmModal.addEventListener('click', e => { if(e.target === confirmModal) closeConfirmModal(); });
    confirmClearBtn.addEventListener('click', () => {
      localStorage.removeItem(STORAGE_COMPLETED);
      localStorage.removeItem(STORAGE_FILTER);
      completedSet.clear();
      realDept = '';
      yearSelect.value = '1';
      termSelect.value = 'all';
      updateDepartmentOptions();
      saveFilterState();
      render();
      updateOverallProgress();
      buildReminders();
      closeConfirmModal();
      showToast('تم مسح جميع البيانات بنجاح');
    });

    closeModalBtn.addEventListener('click', () => { openCoursesModal.style.display = 'none'; unlockScroll(); });
    openCoursesModal.addEventListener('click', e => { if(e.target === openCoursesModal) { openCoursesModal.style.display = 'none'; unlockScroll(); } });
    document.addEventListener('keydown', e => {
      if(e.key === 'Escape') {
        if(openCoursesModal.style.display === 'flex') { openCoursesModal.style.display = 'none'; unlockScroll(); }
        if(confirmModal.style.display === 'flex') { closeConfirmModal(); }
      }
    });

    fetch('data/subjects.json')
      .then(res => res.json())
      .then(data => {
        allData = data;
        allData.forEach(sem => {
          const title = sem.semester;
          let year = null, term = null, dept = null;
          if (title.includes('أولى')) year = 1;
          else if (title.includes('ثانية')) year = 2;
          else if (title.includes('ثالثة')) year = 3;
          else if (title.includes('رابعة')) year = 4;
          if (title.includes('الأول')) term = 1;
          else if (title.includes('الثاني')) term = 2;
          if (title.includes('CS')) dept = 'CS';
          else if (title.includes('IT')) dept = 'IT';
          else if (title.includes('IS')) dept = 'IS';
          else if (title.includes('عام')) dept = 'عام';

          (sem.courses || []).forEach(c => {
            courseMap[c.code] = c;
            courseDetailsMap[c.code] = { year, term, termLabel: term===1?'ترم أول':(term===2?'ترم ثاني':''), dept: dept||'عام', semesterTitle: title };
            (c.prerequisites || []).forEach(pre => {
              if (!prereqToDependents[pre]) prereqToDependents[pre] = [];
              prereqToDependents[pre].push(c.code);
            });
          });
        });
        loadFilterState();
        updateDepartmentOptions();
        render();
        updateOverallProgress();
        buildReminders();
      }).catch(() => container.innerHTML = '<div class="empty-msg">تعذّر تحميل الملف</div>');

    function saveFilterState() { localStorage.setItem(STORAGE_FILTER, JSON.stringify({ year: yearSelect.value, dept: realDept, term: termSelect.value })); }
    function loadFilterState() {
      const s = JSON.parse(localStorage.getItem(STORAGE_FILTER) || '{}');
      if (s.year) yearSelect.value = s.year;
      realDept = s.dept || '';
      termSelect.value = s.term || 'all';
      if (yearSelect.value === '3' && !realDept) realDept = 'عام';
      updateDepartmentOptions();
    }

    function updateDepartmentOptions() {
      const y = yearSelect.value;
      if (y === '1' || y === '2') {
        deptSelect.value = 'عام';
        deptSelect.disabled = true;
        Array.from(deptSelect.options).forEach(o => o.hidden = (o.value !== 'عام'));
      } else if (y === '3') {
        deptSelect.disabled = false;
        Array.from(deptSelect.options).forEach(o => o.hidden = false);
        if (!realDept || realDept === 'عام') {
          realDept = 'عام';
          deptSelect.value = 'عام';
        } else {
          deptSelect.value = realDept;
        }
      } else if (y === '4') {
        deptSelect.disabled = true;
        Array.from(deptSelect.options).forEach(o => o.hidden = false);
        if (!realDept || realDept === 'عام') {
          deptSelect.value = 'عام';
        } else {
          deptSelect.value = realDept;
        }
      }
      updateNavButtons();
    }

    function updateNavButtons() { const y=+yearSelect.value; prevYearBtn.disabled=y===1; nextYearBtn.disabled=y===4; }

    yearSelect.addEventListener('change', ()=>{
      updateDepartmentOptions();
      saveFilterState();
      render();
      buildReminders();
    });
    prevYearBtn.addEventListener('click', ()=>{ const c=+yearSelect.value; if(c>1){ yearSelect.value=c-1; yearSelect.dispatchEvent(new Event('change')); } });
    nextYearBtn.addEventListener('click', ()=>{ const c=+yearSelect.value; if(c<4){ yearSelect.value=c+1; yearSelect.dispatchEvent(new Event('change')); } });
    deptSelect.addEventListener('change', ()=>{
      if (!deptSelect.disabled) realDept = deptSelect.value;
      saveFilterState();
      render();
      updateOverallProgress();
      buildReminders();
    });
    termSelect.addEventListener('change', ()=>{ saveFilterState(); render(); });

    clearDataBtn.addEventListener('click', openConfirmModal);

    fillPreviousBtn.addEventListener('click', fillPreviousCourses);

function fillPreviousCourses() {
  const currentYear = parseInt(yearSelect.value);
  const currentTerm = termSelect.value;
  const currentDept = realDept;
  const codesToAdd = new Set();

  allData.forEach(sem => {
    const ti = sem.semester;
    let year = null, term = null, courseDept = null;

    if (ti.includes('أولى')) year = 1;
    else if (ti.includes('ثانية')) year = 2;
    else if (ti.includes('ثالثة')) year = 3;
    else if (ti.includes('رابعة')) year = 4;
    if (!year) return;

    if (ti.includes('الأول')) term = 1;
    else if (ti.includes('الثاني')) term = 2;
    if (!term) return;

    if (ti.includes('CS')) courseDept = 'CS';
    else if (ti.includes('IT')) courseDept = 'IT';
    else if (ti.includes('IS')) courseDept = 'IS';
    else if (ti.includes('عام')) courseDept = 'عام';

    const canAdd = () => {
      if (currentDept && currentDept !== 'عام') {
        return courseDept === currentDept || courseDept === 'عام';
      } else {
        return courseDept === 'عام';
      }
    };

    if (year < currentYear) {
      if (canAdd()) {
        (sem.courses || []).forEach(c => codesToAdd.add(c.code));
      }
    } else if (year === currentYear && currentTerm === '2' && term === 1) {
      if (canAdd()) {
        (sem.courses || []).forEach(c => codesToAdd.add(c.code));
      }
    }
  });

  if (codesToAdd.size === 0) {
    showToast('لا توجد مواد سابقة لإضافتها');
    return;
  }

  codesToAdd.forEach(code => completedSet.add(code));
  persistAndUpdate();
  render();
  showToast(`تم تحديد ${codesToAdd.size} مادة من السنوات السابقة`);
}

    function formatPrerequisites(codes) {
      if(!codes||!codes.length) return '';
      return codes.map(c=>{ const co=courseMap[c]; return `<span class="prereq-item">${co?co.arabic_name||co.name:c} (${c})</span>`; }).join(' ');
    }

    function filterSemesters() {
      const y=yearSelect.value, d=deptSelect.value, t=termSelect.value;
      let res=[];
      allData.forEach(sem=>{
        const ti=sem.semester;
        if(y==='1'&&!ti.includes('أولى')) return; if(y==='2'&&!ti.includes('ثانية')) return;
        if(y==='3'&&!ti.includes('ثالثة')) return; if(y==='4'&&!ti.includes('رابعة')) return;
        if(t==='1'&&!ti.includes('الأول')) return; if(t==='2'&&!ti.includes('الثاني')) return;
        let courses=sem.courses||[];
        if(y==='3'){ if(d==='عام'&&!ti.includes('عام')) return; else if(['CS','IT','IS'].includes(d)&&!ti.includes(d)) return; }
        else if(y==='4'){ if(d==='عام') return; else if(['CS','IT','IS'].includes(d)&&!ti.includes(d)) return; }
        if(courses.length) res.push({title:ti, courses});
      });
      return res;
    }

    function getGlobalScopeCourses() {
      const d=realDept; const scope=[];
      allData.forEach(sem=>{
        const ti=sem.semester; let y=null;
        if(ti.includes('أولى')) y=1; else if(ti.includes('ثانية')) y=2; else if(ti.includes('ثالثة')) y=3; else if(ti.includes('رابعة')) y=4;
        if(!y) return;
        (sem.courses||[]).forEach(c=>{
          if(y===1||y===2) scope.push(c);
          else if(y===3){ if(d==='عام'&&ti.includes('عام')) scope.push(c); else if(['CS','IT','IS'].includes(d)&&ti.includes(d)) scope.push(c); }
          else if(y===4){ if(['CS','IT','IS'].includes(d)&&ti.includes(d)) scope.push(c); }
        });
      });
      return [...new Map(scope.map(c=>[c.code,c])).values()];
    }

    function updateOverallProgress() {
      const scope=getGlobalScopeCourses(); const total=scope.length;
      let comp=0; scope.forEach(c=>{ if(completedSet.has(c.code)) comp++; });
      overallProgressFill.style.width=(total? (comp/total)*100 :0)+'%';
      overallProgressText.textContent=`${comp} / ${total} مادة مكتملة`;
    }

    function getVisibleDependentsCount(code) {
      const dependents = prereqToDependents[code] || [];
      if (dependents.length === 0) return 0;
      const details = courseDetailsMap[code];
      if (!details) return dependents.length;
      if ((details.year === 3 || details.year === 4) && realDept && realDept !== 'عام') {
        return dependents.filter(dep => {
          const depDetails = courseDetailsMap[dep];
          return depDetails && depDetails.dept === realDept;
        }).length;
      }
      return dependents.length;
    }

    function render() {
      const sems=filterSemesters(); container.innerHTML='';
      if(!sems.length) {
        let msg='لا توجد مواد تطابق الفلتر';
        if((yearSelect.value==='3'||yearSelect.value==='4')&&deptSelect.value==='') msg='الرجاء اختيار القسم';
        else if(yearSelect.value==='4'&&deptSelect.value==='عام') msg='لا توجد مواد للعام في الرابعة';
        container.innerHTML=`<div class="empty-msg">${msg}</div>`; return;
      }
      sems.forEach(sem => {
        const block=document.createElement('div'); block.className='semester-block';
        const allCompleted = sem.courses.every(c => completedSet.has(c.code));
        const btnText = allCompleted ? 'مسح الكل' : 'تحديد الكل';
        block.innerHTML=`<div class="semester-title"><span>${sem.title}</span><button class="select-all-btn">${btnText}</button></div><div class="courses-grid"></div>`;
        const grid=block.querySelector('.courses-grid');
        sem.courses.forEach(course=>{
          const code=course.code, isCompleted=completedSet.has(code);
          const hasVisibleDependents = getVisibleDependentsCount(code) > 0;
          const card=document.createElement('div'); card.className=`course-card ${isCompleted?'completed':''}`; card.dataset.code=code;
          card.innerHTML=`
            <div class="checkbox-custom">&#10003;</div>
            <div class="course-info">
              <div class="course-arabic">${course.arabic_name||course.name}</div>
              <div class="course-code">${code}</div>
              <div class="course-english">${course.name}</div>
              ${course.prerequisites?.length?`<div class="prereq"><span class="prereq-label">متطلبات:</span> ${formatPrerequisites(course.prerequisites)}</div>`:''}
            </div>
            <span class="completed-badge">&#10003; تم</span>
            ${hasVisibleDependents?`<button class="open-courses-btn" data-code="${code}">يفتح</button>`:''}
          `;
          card.addEventListener('click', e=>{ if(!e.target.closest('.open-courses-btn')) toggleCompleted(code,card,course); });
          grid.appendChild(card);
        });
        grid.querySelectorAll('.open-courses-btn').forEach(btn=> btn.addEventListener('click', e=>{ e.stopPropagation(); showOpenCoursesModal(btn.dataset.code); }));
        const selectAllBtn = block.querySelector('.select-all-btn');
        selectAllBtn.addEventListener('click', e=>{ e.stopPropagation(); toggleAllInSemester(sem.courses, grid, selectAllBtn); });
        container.appendChild(block);
      });
    }

    function showOpenCoursesModal(code) {
      const course = courseMap[code]; if (!course) return;
      const dependents = prereqToDependents[code] || [];
      modalTitle.textContent = `المواد التي تفتحها: ${course.arabic_name || course.name} (${code})`;

      const deptGroups = { CS: [], IS: [], IT: [], 'عام': [] };
      const addedCodes = new Set();

      dependents.forEach(depCode => {
        if (addedCodes.has(depCode)) return;
        addedCodes.add(depCode);
        const depCourse = courseMap[depCode], details = courseDetailsMap[depCode] || {};
        const dept = details.dept || 'عام';
        if (!deptGroups[dept]) deptGroups[dept] = [];
        deptGroups[dept].push({
          code: depCode, name: depCourse ? (depCourse.arabic_name || depCourse.name) : depCode,
          english: depCourse ? depCourse.name : '', year: details.year || '?', termLabel: details.termLabel || '?'
        });
      });

      const currentDetails = courseDetailsMap[code];
      let filterDept = null;
      if (currentDetails && (currentDetails.year === 3 || currentDetails.year === 4) && realDept && realDept !== 'عام') {
        filterDept = realDept;
      }

      Object.keys(deptGroups).forEach(d => deptGroups[d].sort((a, b) => a.year !== b.year ? a.year - b.year : (a.termLabel === 'ترم أول' ? 1 : 2) - (b.termLabel === 'ترم أول' ? 1 : 2)));

      let html = '', total = 0;
      const deptOrder = filterDept ? [filterDept] : ['عام', 'CS', 'IS', 'IT'];

      deptOrder.forEach(dept => {
        const courses = deptGroups[dept];
        if (!courses || !courses.length) return;
        total += courses.length;
        html += `<div class="modal-dept-group"><div class="modal-dept-title">من طريق ${dept} (${courses.length} مواد)</div>`;
        courses.forEach((c, i) => {
          html += `<div class="modal-course-item"><span><span style="color:#fbbf24;">${i + 1}.</span> <span class="course-name">${c.name}</span> <span style="font-size:12px;color:#64748b;">(${c.english})</span></span><span class="course-detail">${c.code} · سنة ${c.year} · ${c.termLabel}</span></div>`;
        });
        html += `</div>`;
      });

      html += `<div class="modal-total">إجمالي عدد المواد التي تفتحها: ${total}</div>`;
      modalBody.innerHTML = html;
      openCoursesModal.style.display = 'flex';
      lockScroll();
    }

    function toggleAllInSemester(courses, grid, btnElement) {
      const allCompleted = courses.every(c => completedSet.has(c.code));
      if (allCompleted) {
        courses.forEach(c => { if(completedSet.has(c.code)) { completedSet.delete(c.code); cascadeUncheck(c.code); } });
        grid.querySelectorAll('.course-card').forEach(c => c.classList.remove('completed'));
        persistAndUpdate();
        showToast('تم إلغاء إكمال جميع المواد');
      } else {
        let changed = false; const added = new Set(); let keep = true;
        while(keep) { keep=false; courses.forEach(c=>{ if(completedSet.has(c.code)) return; if((c.prerequisites||[]).every(p=>completedSet.has(p)||added.has(p))) { completedSet.add(c.code); added.add(c.code); changed=true; keep=true; } }); }
        if(changed) { grid.querySelectorAll('.course-card').forEach(c=>{ if(added.has(c.dataset.code)) c.classList.add('completed'); }); persistAndUpdate(); showToast('تم تحديد جميع المواد الممكنة'); }
        else showToast('لا توجد مواد إضافية يمكن إكمالها حالياً');
      }
      const nowAllCompleted = courses.every(c => completedSet.has(c.code));
      if (btnElement) btnElement.textContent = nowAllCompleted ? 'مسح الكل' : 'تحديد الكل';
    }

    function updateCardVisual(code){ const c=document.querySelector(`.course-card[data-code="${code}"]`); if(c) c.classList.toggle('completed', completedSet.has(code)); }
    function cascadeUncheck(code){ (prereqToDependents[code]||[]).forEach(d=>{ if(completedSet.has(d)){ completedSet.delete(d); updateCardVisual(d); cascadeUncheck(d); } }); }
    function toggleCompleted(code, card, course){
      if(completedSet.has(code)){
        completedSet.delete(code); cascadeUncheck(code); updateCardVisual(code); persistAndUpdate(); showToast('تم إلغاء الإكمال');
      } else {
        const pre=course.prerequisites||[]; if(pre.length){ const miss=pre.filter(p=>!completedSet.has(p)); if(miss.length){ showToast(`يجب إنهاء: ${formatPrerequisites(miss)}`); return; } }
        completedSet.add(code); updateCardVisual(code); persistAndUpdate(); showToast('تم الإكمال');
      }
      updateCurrentSemesterSelectAllBtn(code);
    }

    function updateCurrentSemesterSelectAllBtn(code) {
      const card = document.querySelector(`.course-card[data-code="${code}"]`);
      if (!card) return;
      const grid = card.closest('.courses-grid');
      const block = grid.closest('.semester-block');
      const btn = block.querySelector('.select-all-btn');
      const courses = Array.from(grid.querySelectorAll('.course-card')).map(c => courseMap[c.dataset.code]);
      const allComp = courses.every(c => completedSet.has(c.code));
      btn.textContent = allComp ? 'مسح الكل' : 'تحديد الكل';
    }

    function persistAndUpdate(){ localStorage.setItem(STORAGE_COMPLETED, JSON.stringify([...completedSet])); updateOverallProgress(); buildReminders(); }
    function showToast(m){ toast.innerHTML=m; toast.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>toast.classList.remove('show'),3500); }

    function buildReminders(){
      const scope=getGlobalScopeCourses(); const scopeCodes=new Set(scope.map(c=>c.code));
      const years={1:{first:[],second:[]},2:{first:[],second:[]},3:{first:[],second:[]},4:{first:[],second:[]}};
      const added={1:{first:new Set(),second:new Set()},2:{first:new Set(),second:new Set()},3:{first:new Set(),second:new Set()},4:{first:new Set(),second:new Set()}};
      allData.forEach(sem=>{
        const ti=sem.semester; let y=null; if(ti.includes('أولى')) y=1; else if(ti.includes('ثانية')) y=2; else if(ti.includes('ثالثة')) y=3; else if(ti.includes('رابعة')) y=4;
        if(!y) return; const isF=ti.includes('الأول'), isS=ti.includes('الثاني'); const tk=isF?'first':(isS?'second':null); if(!tk) return;
        (sem.courses||[]).forEach(c=>{ if(!completedSet.has(c.code)&&scopeCodes.has(c.code)&&!added[y][tk].has(c.code)){ added[y][tk].add(c.code); years[y][tk].push({code:c.code,name:c.arabic_name||c.name,english:c.name}); } });
      });
      let html=''; const yn=['','الأولى','الثانية','الثالثة','الرابعة'];
      for(let y=1;y<=4;y++){ const f=years[y].first, s=years[y].second, t=f.length+s.length;
        html+=`<div class="year-reminder"><div class="year-header" onclick="toggleReminderYear(this)"><span>الفرقة ${yn[y]} (${t} مادة متبقية)</span><span class="arrow">▼</span></div><div class="year-body-wrapper"><div class="year-body">${t===0?'<p style="color:#10b981;">مكتملة</p>':`${f.length?`<div class="term-separator">ترم أول</div><ul class="remaining-list">${f.map(c=>`<li><span>${c.name} <span style="font-size:12px;color:#64748b;">(${c.english})</span></span><span class="remaining-code">${c.code}</span></li>`).join('')}</ul>`:''}${s.length?`<div class="term-separator">ترم ثاني</div><ul class="remaining-list">${s.map(c=>`<li><span>${c.name} <span style="font-size:12px;color:#64748b;">(${c.english})</span></span><span class="remaining-code">${c.code}</span></li>`).join('')}</ul>`:''}`}</div></div></div>`; }
      reminderContainer.innerHTML=html;
    }
    function toggleReminderYear(h){
      const r=h.parentElement, w=r.querySelector('.year-body-wrapper'), b=w.querySelector('.year-body'), o=r.classList.contains('open');
      if(o){ w.style.height=w.scrollHeight+'px'; requestAnimationFrame(()=>{ w.style.height='0px'; }); r.classList.remove('open'); setTimeout(()=>{ if(!r.classList.contains('open')) w.style.height=''; },400); }
      else { r.classList.add('open'); w.style.height='0px'; requestAnimationFrame(()=>{ w.style.height=b.scrollHeight+'px'; }); setTimeout(()=>{ if(r.classList.contains('open')) w.style.height='auto'; },400); }
    }
    updateDepartmentOptions();
  </script>
  <script src="tour-guide.js"></script>
</body>
</html>
